apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s  # 15초마다 메트릭 수집
      evaluation_interval: 15s  # 15초마다 알림 규칙 평가
      external_labels:
        cluster: {{ .Values.global.environment }}
        namespace: {{ .Values.global.namespace }}

    # 알림 규칙 파일
    rule_files:
      - /etc/prometheus/rules/*.yml

    # 메트릭 수집 대상
    scrape_configs:
      # Router Agent 메트릭 수집
      - job_name: 'router-agent'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Values.global.namespace }}
        relabel_configs:
          # app=router-agent 레이블을 가진 Pod만 수집
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: router-agent
          # Pod 이름을 instance 레이블로 설정
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
          # 메트릭 경로 설정
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # 포트 설정
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

      # SDB Agent 메트릭 수집
      - job_name: 'sdb-agent'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Values.global.namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: sdb-agent
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

      # Kubernetes Pod 메트릭 (cAdvisor)
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: kubernetes_pod_name

  # 알림 규칙
  alert-rules.yml: |
    groups:
      - name: agent_alerts
        interval: 30s
        rules:
          # Router Agent 에러율 급증
          - alert: RouterHighErrorRate
            expr: |
              rate(router_errors_total[5m]) > 0.1
            for: 2m
            labels:
              severity: warning
              component: router-agent
            annotations:
              summary: "Router Agent 에러율 급증"
              description: "최근 5분간 에러율이 10%를 초과했습니다. (현재: {{ "{{" }} $value | humanizePercentage {{ "}}" }})"

          # SDB Agent 처리 시간 급증
          - alert: SDBHighLatency
            expr: |
              histogram_quantile(0.95, rate(sdb_processing_duration_seconds_bucket[5m])) > 10
            for: 3m
            labels:
              severity: warning
              component: sdb-agent
            annotations:
              summary: "SDB Agent 처리 시간 급증"
              description: "P95 처리 시간이 10초를 초과했습니다. (현재: {{ "{{" }} $value {{ "}}" }}초)"

          # Pod 재시작 빈번
          - alert: PodRestarting
            expr: |
              rate(kube_pod_container_status_restarts_total{namespace="agent-system"}[15m]) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod 재시작 발생"
              description: "{{ "{{" }} $labels.pod {{ "}}" }}가 최근 15분간 재시작되었습니다."

          # CPU 사용률 높음
          - alert: HighCPUUsage
            expr: |
              rate(container_cpu_usage_seconds_total{namespace="agent-system"}[5m]) > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "CPU 사용률 높음"
              description: "{{ "{{" }} $labels.pod {{ "}}" }}의 CPU 사용률이 80%를 초과했습니다."

          # 메모리 사용률 높음
          - alert: HighMemoryUsage
            expr: |
              container_memory_usage_bytes{namespace="agent-system"} / container_spec_memory_limit_bytes{namespace="agent-system"} > 0.9
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "메모리 사용률 높음"
              description: "{{ "{{" }} $labels.pod {{ "}}" }}의 메모리 사용률이 90%를 초과했습니다."

