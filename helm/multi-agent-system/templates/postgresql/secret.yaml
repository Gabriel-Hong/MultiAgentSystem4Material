{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app: postgresql
    {{- include "multi-agent-system.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64 인코딩된 비밀번호
  # values.yaml에서 기본값 제공 (개발환경: postgres123)
  POSTGRES_PASSWORD: {{ .Values.postgresql.password | default "postgres123" | b64enc }}
{{- end }}
