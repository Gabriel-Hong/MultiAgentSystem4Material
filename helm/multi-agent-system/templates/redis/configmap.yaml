apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: {{ .Values.global.namespace }}
  labels:
    app: redis
data:
  redis.conf: |
    # 네트워크
    bind 0.0.0.0
    protected-mode no
    port 6379

    # 메모리 관리
    maxmemory 512mb
    # LRU 정책으로 오래된 키 삭제
    maxmemory-policy allkeys-lru

    # 지속성 - RDB 스냅샷 비활성화 (캐시 용도이므로)
    save ""
    # AOF 비활성화
    appendonly no

    # 로깅
    loglevel notice
    logfile ""

    # 클라이언트
    timeout 300
    tcp-keepalive 60

    # 보안 (프로덕션에서는 requirepass 설정 권장)
    # requirepass your-strong-password
